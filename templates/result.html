<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-light">
  <div class="container mt-5">
    <h1 class="text-center mb-4">Prediction Result</h1>

    <div class="card p-4 shadow-sm mb-4">
      <h4 class="text-primary">{{ prediction }}</h4>
    </div>

    <div class="card p-4 shadow-sm mb-4">
      <h5>Health Insights</h5>
      <p>{{ insights }}</p>
    </div>

    <div class="card p-4 shadow-sm mb-4">
      <h5>Prediction Probabilities</h5>
      <div id="probabilities"></div>
      <script>
        var data = [{
          type: "pie",
          labels: {{ classes|tojson }},
          values: {{ probabilities|tojson }},
          textinfo: "label+percent",
          hole: .4
        }];
        Plotly.newPlot("probabilities", data);
      </script>
    </div>

    <a href="/" class="btn btn-secondary d-block mx-auto mt-4" style="width:200px;">🔙 Try another prediction</a>
  </div>
</body>
</html>
